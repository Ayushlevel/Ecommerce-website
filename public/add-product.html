<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | ShopHub</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="add-product-page">

<div class="add-product-container">

    <h1>➕ Add New Product</h1>
    <p>Fill in the details below to add a new product.</p>

    <form id="productForm">

        <input
            type="text"
            id="name"
            placeholder="Product Name"
            required
        >

        <input
            type="number"
            id="price"
            placeholder="Price (₹)"
            required
        >

        <input
            type="text"
            id="image"
            placeholder="Image URL"
            required
        >

        <input
            type="text"
            id="category"
            placeholder="Category (electronics/accessories)"
            required
        >

        <textarea
            id="description"
            placeholder="Product Description"
            rows="5"
        ></textarea>

        <button type="submit">
            Add Product
        </button>

    </form>

</div>

<script src="js/add-product.js"></script>

</body>
</html>
