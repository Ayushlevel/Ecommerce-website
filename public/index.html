<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">ShopHub</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li>
                <a href="cart.html">Cart  
                    (<span id="cartCount"> 0 </span>)
                </a>
            </li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to ShopHub</h1>
        <p>Best products at affordable prices</p>

        <button>Shop Now</button>
    </section>
    <!--SEARH BAR -->
    <section class="search-section">
        <input
        type="text"
        id="searchInput"
        placeholder="Search Products"
        >

    </section>
    <!--Product Filter-->
    <section class="filter-section">
        <button onclick="filterProducts('all')">
            All
        </button>
        <button onclick="filterProducts('electronics')">
            Electronics
        </button>
        <button onclick="filterProducts('Accessories')">
        Accessories
        </button>
    </section>
    <!-- Products Section -->

  <section class="products">
    <h2>Featured Products</h2>

    <div class="product-container" id="productContainer">
    
     </div>
   </section>
   <script src="js/script.js"></script>
</body>
</html>
<footer class="footer">
    <p>© 2026 ShopHub | Built with HTML, CSS & JavaScript</p>
</footer>
