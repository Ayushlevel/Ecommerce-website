<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
    <span class="cart-icon">🛒</span>
    ShopHub
 </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li>
                <a href="cart.html">Cart  
                    (<span id="cartCount"> 0 </span>)
                </a>
            </li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
    <h1 class="hero-title">
    Shop <span> With </span>SHOPHUB
    </h1>

 <p class="hero-subtitle">
    Your trusted destination for premium Products.
 </p>
        <button onclick="document.querySelector('.products').scrollIntoView({behavior:'smooth'})">
    Shop Now
        </button>
    </section>
    <!--SEARH BAR -->
    <section class="search-section">
        <input
        type="text"
        id="searchInput"
        placeholder="Search Products"
        >

    </section>
    <!--Product Filter-->
    <section class="filter-section">
        <button onclick="filterProducts('all')">
            All
        </button>
        <button onclick="filterProducts('electronics')">
            Electronics
        </button>
        <button onclick="filterProducts('accessories')">
        Accessories
        </button>
    </section>
    <!-- Products Section -->

  <section class="products">
    <h2>Featured Products</h2>

    <div class="product-container" id="productContainer">
    
     </div>
   </section>
   
 <div class="nav-buttons">

    <a href="cart.html" class="nav-btn">
        🛒 Cart
    </a>

    <a href="orders.html" class="nav-btn">
        📦 Orders
    </a>

 </div>

 <div class="add-product-container">

    <a href="add-product.html" class="nav-btn">
        ➕ Add Product
    </a>

 </div>

 <footer class="footer">
    <p>© 2026 ShopHub | Built with HTML, CSS & JavaScript</p>
 </footer>

  <script src="js/script.js"></script>
</body>
</html>
